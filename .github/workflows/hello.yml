# Workflow name
name: hello
# Event triggered can determined as array test1,test2
on: 
  push:
    branches: [main]
    # push: [a, b] 
    # = 
    # push: 
    #   -a 
    #   -b
  pull_request:
    branches: [main]
# List jobs
jobs:
  # Job name
  hello-job:
    runs-on: ubuntu-latest
    steps:
      - name: Run a one-line script
        run: echo "Hello Github Actions!"
  second-job:
    runs-on: windows-latest
    steps:
      - name: Run a one-line script
        run: echo "Runs jobs on environ ${{ runner.os }}"

        
